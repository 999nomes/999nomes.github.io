<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Dados Excel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="extratorperfil.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke="url(#g1)" stroke-width="2"/>
                    <path d="M8 8L16 16M16 8L8 16" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="g1" x1="3" y1="3" x2="21" y2="21" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#10B981"/>
                            <stop offset="1" stop-color="#3B82F6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1>Extrator de Perfil</h1>
            </div>
            <p>Copie a linha do Excel e pressione <strong>Ctrl + V</strong> em qualquer lugar da tela.</p>
        </header>

        <main>
            <!-- Sticky action bar -->
            <div id="action-bar" class="action-bar hidden">
                <div class="action-bar-left">
                    <button id="clear-btn" class="clear-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                        </svg>
                        Limpar
                    </button>
                    <div class="search-wrapper">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                        <input type="text" id="search-input" class="search-input" placeholder="Buscar por nome...">
                    </div>
                </div>
                <span class="results-count" id="results-count">0 registros</span>
            </div>

            <div id="empty-state" class="empty-state">
                <div class="paste-icon">📋</div>
                <h2>Aguardando dados...</h2>
                <p>Nenhuma linha foi colada ainda.</p>
            </div>

            <div class="no-results-msg" id="no-results-msg">
                🔍 Nenhum colaborador encontrado para "<span id="search-term"></span>"
            </div>

            <div id="results" class="results-container"></div>
        </main>
    </div>

    <!-- Preview Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>✉️ Prévia da Solicitação</h2>
                <button id="modal-close" class="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <pre id="modal-content"></pre>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel" class="modal-cancel-btn">Cancelar</button>
                <button id="modal-confirm" class="modal-confirm-btn">📋 Copiar e Confirmar</button>
            </div>
        </div>
    </div>

    <script src="extratorperfil.js"></script>
</body>
</html>
