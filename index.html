<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mercado & IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>🛒 Calc Mercado</h1>
                <div class="header-actions">
                    <button id="finish-btn" class="action-btn finish" title="Salvar histórico de compras">💾 Salvar</button>
                    <button id="theme-toggle" class="action-btn theme-toggle" aria-label="Alternar tema">
                        <span class="icon-moon">🌙</span>
                        <span class="icon-sun" style="display: none;">☀️</span>
                    </button>
                </div>
            </div>
            
            <nav class="tabs-nav">
                <button class="tab-btn active" data-target="tab-calculator">Carrinho</button>
                <button class="tab-btn" data-target="tab-recipes">Receitas ✨</button>
            </nav>

            <div class="budget-section" id="header-budget-section">
                <label for="budget">Orçamento opcional (R$):</label>
                <div class="input-group">
                    <input type="number" id="budget" placeholder="0.00" step="0.01" min="0">
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="budget-progress"></div>
                </div>
            </div>
        </header>

        <div class="views-container">
            <!-- ABA 1: Calculadora/Carrinho -->
            <main id="tab-calculator" class="tab-content active">
                <section class="add-item-section">
                    <form id="item-form">
                        <div class="form-row">
                            <div class="form-group flex-2">
                                <label for="item-name">Produto</label>
                                <input type="text" id="item-name" placeholder="Ex: Arroz, Feijão..." required autocomplete="off">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label for="item-price">Preço (R$)</label>
                                <input type="number" id="item-price" placeholder="0.00" step="0.01" min="0" required>
                            </div>
                            <div class="form-group flex-1">
                                <label for="item-qtd">Qtd / Peso</label>
                                <input type="number" id="item-qtd" value="1" min="0.001" step="any" required>
                            </div>
                            <div class="form-group button-group">
                                <button type="submit" class="btn-add">+</button>
                            </div>
                        </div>
                    </form>
                </section>

                <section class="items-list-section">
                    <ul id="items-list">
                        <!-- Itens renderizados via JS -->
                    </ul>
                </section>
            </main>

            <!-- ABA 2: Receitas Inteligentes -->
            <main id="tab-recipes" class="tab-content">
                <div class="recipes-header">
                    <h2>Sugestões de Receitas</h2>
                    <p>Baseado no que você já tem no carrinho.</p>
                </div>
                
                <div class="ai-connect-section" id="ai-connect-section">
                    <button id="ai-connect-btn" class="ai-btn">✨ Conectar Google Gemini</button>
                    <button id="ai-generate-btn" class="ai-btn generate" style="display: none;">🧠 Gerar Receita com IA</button>
                    <p id="ai-status" class="ai-status"></p>
                </div>

                <div id="recipes-list" class="recipes-list">
                    <!-- Cards de receitas renderizados via JS -->
                </div>
            </main>
        </div>

        <footer id="app-footer">
            <div class="summary">
                <div class="summary-item">
                    <span>Itens:</span>
                    <strong id="total-items">0</strong>
                </div>
                <div class="summary-total">
                    <span>Total:</span>
                    <span id="total-price">R$ 0,00</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Modal para Chave API Gemini -->
    <div id="ai-modal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h3>Conectar Gemini (IA Gratuita)</h3>
            <p>Insira sua API Key do Google Gemini (você pode gerar uma de graça no Google AI Studio). A chave fica salva <strong>apenas na sua aba atual</strong>.</p>
            <input type="password" id="ai-key-input" placeholder="AIzaSy...">
            <div class="modal-actions">
                <button id="close-ai-modal" class="btn-cancel">Cancelar</button>
                <button id="save-ai-key" class="btn-primary">Salvar Chave</button>
            </div>
        </div>
    </div>

    <!-- Debugger Console -->
    <button id="toggle-debug" class="toggle-debug-btn" title="Abrir Debugger">🐛</button>
    <div id="debug-panel" class="debug-panel" style="display: none;">
        <div class="debug-header">
            <span>Terminal de Debug</span>
            <div>
                <button id="clear-debug" class="debug-btn">Limpar</button>
                <button id="close-debug" class="debug-btn">Fechar</button>
            </div>
        </div>
        <div id="debug-logs" class="debug-logs"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
